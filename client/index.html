<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dorm Dash</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <meta name="theme-color" content="#3a7d44">
</head>
<body>
  <div id="offline-banner" class="hidden">You are offline — waiting for connection…</div>

  <!-- Screen 1: Join Screen -->
  <div id="screen-join" class="screen active">
    <!-- Join Background Layers -->
    <div class="join-layer layer-sky"></div>
    <div class="join-layer layer-mountain-left"></div>
    <div class="join-layer layer-mountain-right"></div>
    <div class="join-layer layer-treeline">
      <div class="tree tree-1"></div><div class="tree tree-2"></div><div class="tree tree-1"></div><div class="tree tree-2"></div>
      <div class="tree tree-1"></div><div class="tree tree-2"></div><div class="tree tree-1"></div><div class="tree tree-2"></div>
      <div class="tree tree-1"></div><div class="tree tree-2"></div>
    </div>
    <div class="join-layer layer-grass-base"></div>
    <div class="join-layer layer-grass-fore"></div>

    <div class="logo-container">
      <div class="campfire-logo">
        <div class="cf-base"></div>
        <div class="cf-log cf-log-1"></div>
        <div class="cf-log cf-log-2"></div>
        <div class="cf-log cf-log-3"></div>
        <div class="cf-flame-outer"></div>
        <div class="cf-flame-inner"></div>
        <div class="cf-flame-tip"></div>
      </div>
      <h1 class="game-logo">DORM DASH</h1>
    </div>
    
    <div class="card panel-wood">
      <div class="card-header">Enter Your Player Name</div>
      <div class="card-body">
        <input type="text" id="input-name" placeholder="Enter Name" maxlength="12">
        <div class="avatar-select">
          <button class="avatar-btn color-green active" data-color="green"></button>
          <button class="avatar-btn color-red" data-color="red"></button>
          <button class="avatar-btn color-blue" data-color="blue"></button>
          <button class="avatar-btn color-yellow" data-color="yellow"></button>
        </div>
        <div class="room-input-group">
          <label for="input-room" class="room-lbl">Room Code:</label>
          <input type="text" id="input-room" placeholder="ABCD" maxlength="8">
        </div>
        <button id="btn-create-room" class="btn btn-orange btn-block">Create Room</button>
        <button id="btn-join-room" class="btn btn-green btn-block">Join Room</button>
      </div>
    </div>

    <button id="btn-toggle-sound-join" class="sound-toggle-btn" aria-label="Toggle sound">
      <span class="sound-icon-text">
        <svg class="icon-sound-on" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg class="icon-sound-off hidden" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </span>
      <span class="sound-helper-text">Waiting for others? Share your room code!</span>
    </button>
  </div>

  <!-- Screen 2: Lobby Screen -->
  <div id="screen-lobby" class="screen hidden">
    <div class="lobby-bg"></div>
    <div class="top-bar panel-wood-dark">
      <span class="room-code-display">Room Code: <span id="lobby-room-code">----</span></span>
      <button id="btn-copy-link" class="btn btn-orange btn-small">Copy Link</button>
    </div>
    <div class="invite-bar" id="invite-bar">
      <span>+ Invite Friends: <span id="lobby-invite-link">dormdash.game/----</span></span>
      <button id="btn-close-invite" class="btn-icon" style="width:24px; height:24px; background:transparent; padding:0;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    
    <div class="lobby-content">
      <div class="card panel-wood lobby-card">
        <div class="lobby-preview">
          <div class="preview-text">Game Ready!</div>
          <div id="lobby-players" class="preview-players">
            <!-- Player avatars inserted here -->
          </div>
        </div>
        <div class="lobby-settings">
          <div class="setting-row">
            <label>Round Time:</label>
            <select id="select-round-time" disabled>
              <option value="60">1 Minute</option>
              <option value="120">2 Minutes</option>
              <option value="180" selected>3 Minutes</option>
            </select>
          </div>
          <div class="setting-row">
            <label>Max Players:</label>
            <select id="select-max-players" disabled>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
            </select>
          </div>
        </div>
        <button id="btn-start-game" class="btn btn-orange btn-block btn-large">START GAME</button>
      </div>
    </div>
  </div>

  <!-- Screen 3: In-Game Screen -->
  <div id="screen-game" class="screen hidden">
    <div id="arena" class="arena">
      <!-- Arena Background Layers -->
      <div id="arena-layer-sky"></div>
      <div id="arena-layer-treeline-back">
        <div class="arena-tree"></div><div class="arena-tree"></div><div class="arena-tree"></div><div class="arena-tree"></div>
        <div class="arena-tree"></div><div class="arena-tree"></div><div class="arena-tree"></div><div class="arena-tree"></div>
        <div class="arena-tree"></div><div class="arena-tree"></div><div class="arena-tree"></div><div class="arena-tree"></div>
      </div>
      <div id="arena-layer-grass-mid"></div>
      <div id="arena-layer-path"></div>
      <div id="arena-layer-grass-fore"></div>
      <div id="arena-layer-rocks">
        <div class="rock-cluster cluster-1"><div class="rock r1"></div><div class="rock r2"></div><div class="rock r3"></div></div>
        <div class="rock-cluster cluster-2"><div class="rock r1"></div><div class="rock r2"></div></div>
        <div class="rock-cluster cluster-3"><div class="rock r1"></div><div class="rock r2"></div><div class="rock r3"></div></div>
      </div>
      <div id="arena-layer-campfire-deco">
        <div class="campfire-logo deco">
          <div class="cf-base"></div>
          <div class="cf-log cf-log-1"></div>
          <div class="cf-log cf-log-2"></div>
          <div class="cf-log cf-log-3"></div>
          <div class="cf-flame-outer"></div>
          <div class="cf-flame-inner"></div>
          <div class="cf-flame-tip"></div>
        </div>
      </div>
      
      <!-- Entities will be injected here via DOM pool -->
    </div>
    
    <!-- Top HUD -->
    <div class="hud-top">
      <div class="scoreboard" id="hud-scoreboard">
        <!-- Score items injected here -->
      </div>
      <div class="timer" id="hud-timer">00:00</div>
      <div class="powerups" id="hud-powerups">
        <div class="powerup-slot" id="slot-bolt"><svg viewBox="0 0 24 24" width="24" height="24" fill="gold"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg><div class="duration-bar"></div></div>
        <div class="powerup-slot" id="slot-shield"><svg viewBox="0 0 24 24" width="24" height="24" fill="lightblue"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg><div class="duration-bar"></div></div>
        <div class="powerup-slot" id="slot-magnet"><svg viewBox="0 0 24 24" width="24" height="24" fill="silver"><path d="M12 2C8.13 2 5 5.13 5 9v6h4V9c0-1.66 1.34-3 3-3s3 1.34 3 3v6h4V9c0-3.87-3.13-7-7-7z"/></svg><div class="duration-bar"></div></div>
      </div>
    </div>

    <!-- Bottom HUD & Controls -->
    <div class="hud-bottom">
      <div class="touch-controls" id="touch-dpad">
        <button class="dpad-btn up" data-dir="up">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg>
        </button>
        <button class="dpad-btn left" data-dir="left">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
        </button>
        <button class="dpad-btn right" data-dir="right">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
        <button class="dpad-btn down" data-dir="down">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6-1.41-1.41z"/></svg>
        </button>
      </div>
      <div class="action-controls">
        <button id="btn-menu" class="btn-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
      </div>
    </div>

    <!-- Banner overlay -->
    <div id="action-banner" class="action-banner hidden">
      <span id="action-banner-text"></span>
    </div>

    <!-- Menu Overlay -->
    <div id="menu-overlay" class="menu-overlay hidden">
      <div class="card panel-wood text-center">
        <h2 id="menu-title" class="gold-text">Paused</h2>
        <button id="btn-resume" class="btn btn-blue btn-block">Resume</button>
        <button id="btn-quit" class="btn btn-red btn-block">Quit</button>
        <button id="btn-toggle-sound-game" class="btn btn-orange btn-block">Toggle Sound</button>
      </div>
    </div>
  </div>

  <!-- Screen 4: End Screen -->
  <div id="screen-end" class="screen hidden">
    <div id="confetti-container"></div>
    <div class="card panel-wood end-card" style="z-index: 10;">
      <h1 class="game-logo" id="winner-name">CamperA Wins!</h1>
      <div id="final-scoreboard" class="final-scoreboard">
        <!-- Final scores injected here -->
      </div>
      <button id="btn-play-again" class="btn btn-orange btn-block">Play Again</button>
      <button id="btn-home" class="btn btn-blue btn-block">Return to Home</button>
    </div>
  </div>

  <script src="./ws-mock.js"></script>
  <script src="./ws-client.js"></script>
  <script src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.log('Service Worker Registration Failed', err));
    }
  </script>
</body>
</html>
